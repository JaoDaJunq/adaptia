<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Controle do Jogador | RPG Adaptia</title>
  <meta name="description" content="Controle mobile do jogador para o RPG Adaptia, com ficha, entrada em sessão, decisões, rolagens e Realtime via Supabase." />
  <meta property="og:title" content="Controle do Jogador | RPG Adaptia" />
  <meta property="og:description" content="Entre na sessão, role dados e jogue Adaptia pelo celular." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --bg: #120d17;
      --bg-2: #21152b;
      --surface: rgba(255, 250, 235, 0.08);
      --surface-strong: rgba(255, 250, 235, 0.14);
      --paper: #fff6df;
      --paper-soft: #f7e8c5;
      --ink: #2a1a11;
      --muted: #d6c7a7;
      --text: #fff8e8;
      --gold: #f3c95b;
      --gold-2: #ffe48a;
      --green: #9be38d;
      --danger: #ff7d7d;
      --blue: #86d9ff;
      --purple: #cda7ff;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --radius: 22px;
      --radius-sm: 14px;
      --focus: 0 0 0 4px rgba(243,201,91,.32);
      --max: 620px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(243,201,91,.18), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(134,217,255,.13), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(205,167,255,.12), transparent 34%),
        linear-gradient(145deg, #100a15 0%, #1d1228 52%, #0c1019 100%);
      line-height: 1.5;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .14;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 75%);
      z-index: -1;
    }

    button, input { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app-shell {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 14px 14px calc(22px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 6px;
      padding: 6px 10px;
      border: 1px solid rgba(243,201,91,.32);
      border-radius: 999px;
      color: var(--gold-2);
      background: rgba(0,0,0,.16);
      font-size: .73rem;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.08;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: -.025em;
    }

    h1 {
      font-size: clamp(1.65rem, 8vw, 2.8rem);
      color: var(--gold-2);
      text-shadow: 0 2px 0 rgba(0,0,0,.26), 0 0 28px rgba(243,201,91,.16);
    }

    h2 {
      font-size: clamp(1.45rem, 7vw, 2.25rem);
      color: var(--gold-2);
    }

    h3 {
      font-size: 1.18rem;
      color: var(--gold-2);
    }

    p { margin: 0; }

    .muted { color: var(--muted); }
    .gold { color: var(--gold-2); }
    .danger { color: #ffd1d1; }
    .success { color: #d7ffd0; }

    .panel {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 28px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,246,223,.10), rgba(255,246,223,.05)),
        rgba(18,13,23,.74);
      box-shadow: var(--shadow);
    }

    .panel + .panel { margin-top: 14px; }

    .panel-header {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .hero-note {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px dashed rgba(255,228,138,.42);
      border-radius: 18px;
      background: rgba(255,228,138,.08);
      color: #fff0bf;
      font-size: .92rem;
    }

    .form-grid { display: grid; gap: 12px; }

    label {
      color: var(--gold-2);
      font-weight: 950;
    }

    input[type="text"] {
      width: 100%;
      min-height: 62px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(243,201,91,.35);
      outline: none;
      color: var(--text);
      background: rgba(0,0,0,.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      font-size: 1.15rem;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    input[type="text"]::placeholder {
      color: rgba(255,248,232,.42);
      letter-spacing: normal;
      text-transform: none;
      font-weight: 700;
    }

    input[type="text"]:focus,
    button:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 1000;
      letter-spacing: .01em;
      transition: transform .16s ease, opacity .16s ease, box-shadow .16s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { cursor: not-allowed; opacity: .48; transform: none; box-shadow: none; }

    .btn-primary {
      color: #221407;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 12px 24px rgba(243,201,91,.22);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
    }

    .btn-blue {
      color: #061923;
      background: linear-gradient(135deg, #c8f2ff, var(--blue));
    }

    .btn-red {
      color: #2b0808;
      background: linear-gradient(135deg, #ffd4d4, var(--danger));
    }

    .btn-green {
      color: #0e230b;
      background: linear-gradient(135deg, #ddffd6, var(--green));
    }

    .btn-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .mini-link {
      border: 0;
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 4px;
      min-height: 44px;
      padding: 8px 0;
      cursor: pointer;
      font-weight: 850;
    }

    .message {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      font-weight: 850;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      color: var(--muted);
    }

    .message.show { display: block; }
    .message.error { color: #ffd1d1; border-color: rgba(255,125,125,.38); background: rgba(255,125,125,.10); }
    .message.ok { color: #d7ffd0; border-color: rgba(155,227,141,.35); background: rgba(155,227,141,.10); }
    .message.info { color: #d5f4ff; border-color: rgba(134,217,255,.34); background: rgba(134,217,255,.10); }

    .character-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.065);
      margin-bottom: 14px;
    }

    .character-card strong {
      display: block;
      color: var(--gold-2);
      font-size: 1.05rem;
      line-height: 1.16;
    }

    .character-card span {
      display: block;
      color: var(--muted);
      font-size: .9rem;
      margin-top: 2px;
    }

    .emblem-wrap {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      flex: none;
      border-radius: 20px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,228,138,.18);
    }

    .emblem-wrap.big {
      width: 132px;
      height: 132px;
      margin: 0 auto 12px;
      border-radius: 28px;
      box-shadow: 0 0 42px rgba(243,201,91,.16);
    }

    .center { text-align: center; }

    .waiting-orb {
      width: 72px;
      height: 72px;
      margin: 8px auto 2px;
      border-radius: 50%;
      border: 4px solid rgba(255,228,138,.14);
      border-top-color: var(--gold-2);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .event-card {
      display: grid;
      gap: 14px;
    }

    .event-title {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,.11);
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.gold {
      color: #24160b;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
    }

    .pill.blue {
      color: #071b25;
      background: linear-gradient(135deg, #bfefff, var(--blue));
    }

    .narrative {
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(243,201,91,.22);
      background: rgba(0,0,0,.18);
      color: #fff2c4;
      font-size: 1rem;
    }

    .stat-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stat-card {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
    }

    .stat-card small {
      display: block;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }

    .stat-card strong {
      color: var(--text);
      font-size: 1.1rem;
    }

    .hp-box {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.11);
    }

    .hp-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--gold-2);
      font-weight: 950;
    }

    .hp-track {
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }

    .hp-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff7d7d, #ffe48a);
      transition: width .3s ease;
    }

    .action-area {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .dice-stage {
      display: grid;
      place-items: center;
      min-height: 132px;
      border-radius: 24px;
      border: 1px solid rgba(255,228,138,.32);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,228,138,.22), transparent 42%),
        rgba(0,0,0,.18);
    }

    .die {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      color: #221407;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 16px 40px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.45);
      font-size: 2.35rem;
      font-weight: 1000;
      transform: rotate(-5deg);
    }

    .die.rolling {
      animation: rollShake .14s ease-in-out infinite alternate;
    }

    @keyframes rollShake {
      from { transform: translateX(-3px) rotate(-9deg) scale(.98); }
      to { transform: translateX(3px) rotate(9deg) scale(1.02); }
    }

    .result-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.08);
    }

    .result-box.successful {
      border-color: rgba(155,227,141,.38);
      background: rgba(155,227,141,.10);
    }

    .result-box.failed {
      border-color: rgba(255,125,125,.38);
      background: rgba(255,125,125,.10);
    }

    .result-main {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--gold-2);
      font-size: 1.45rem;
      font-weight: 950;
      line-height: 1.12;
    }

    .result-detail {
      color: var(--muted);
      font-size: .95rem;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.11);
      background: rgba(255,255,255,.07);
    }

    .summary-item span { color: var(--muted); font-weight: 850; }
    .summary-item strong { color: var(--gold-2); font-size: 1.12rem; }

    .tiny {
      font-size: .82rem;
      color: rgba(255,248,232,.58);
    }

    .hidden { display: none !important; }

    @media (min-width: 520px) {
      .app-shell { padding-top: 22px; }
      .btn-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .btn-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .panel { padding: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Topo do app">
      <div class="brand">
        <p class="eyebrow">🎲 Adaptia • Controle</p>
        <h1>Controle do Jogador</h1>
      </div>
    </header>

    <main id="app" aria-live="polite"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ombgpykvguopgdcdiyqc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FbK97rXHFN_Y8xcQD7ZqEQ_rXWaOcgR';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CLASS_MAIN_ATTRIBUTE = {
      'Guerreiro': 'Resiliência',
      'Bárbaro': 'Resiliência',
      'Paladino': 'Precisão',
      'Monge': 'Instinto',
      'Mago': 'Análise',
      'Bruxo': 'Improviso',
      'Arqueiro': 'Precisão',
      'Bardo': 'Lábia',
      'Feiticeiro': 'Instinto',
      'Ladino': 'Improviso',
      'Sacerdote': 'Lábia',
      'Druida': 'Criatividade'
    };

    const EMBLEM_COLORS = {
      dourado: '#f4c96b',
      teal: '#5fb3a3',
      vermelho: '#d8625a',
      violeta: '#9c6df4',
      azul: '#5a8fd8',
      verde: '#6fae6f',
      rosa: '#d87fb0',
      prata: '#b9bcc4'
    };

    const app = document.getElementById('app');

    const state = {
      screen: 'loading',
      loading: false,
      busy: false,
      rolling: false,
      rollPreview: 'd20',
      message: null,
      personagem: null,
      sessao: null,
      capitulo: null,
      currentAction: null,
      summary: null,
      user: null,
      characters: [],
      channels: []
    };

    function escapeHTML(text) {
      return String(text ?? '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#039;',
        '"': '&quot;'
      }[char]));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function modifier(value) {
      return Math.floor(Number(value || 0) / 2);
    }

    function setMessage(type, text) {
      state.message = text ? { type, text } : null;
    }

    function renderMessage() {
      if (!state.message) return '';
      return `<div class="message show ${state.message.type}" role="alert">${escapeHTML(state.message.text)}</div>`;
    }

    function normalizeAppearance(appearance) {
      const raw = appearance && typeof appearance === 'object' ? appearance : {};
      const formaMap = {
        'Círculo': 'circulo',
        'Circulo': 'circulo',
        'círculo': 'circulo',
        'circulo': 'circulo',
        'Escudo': 'escudo',
        'escudo': 'escudo',
        'Hexágono': 'hexagono',
        'Hexagono': 'hexagono',
        'hexágono': 'hexagono',
        'hexagono': 'hexagono',
        'Losango': 'losango',
        'losango': 'losango'
      };
      const iconMap = {
        espada: 'espada',
        cajado: 'cajado',
        arco: 'arco',
        adaga: 'adaga',
        alaude: 'alaude',
        'alaúde': 'alaude',
        escudo: 'escudo',
        punho: 'punho',
        estrela: 'estrela',
        raio: 'raio',
        cafe: 'cafe',
        'café': 'cafe'
      };
      return {
        forma: formaMap[raw.forma] || 'escudo',
        cor: raw.cor || 'dourado',
        icone: iconMap[raw.icone] || 'estrela',
        nivel_visual: Number(raw.nivel_visual || 1)
      };
    }

    function getEmblemColor(cor) {
      if (typeof cor === 'string' && cor.trim().startsWith('#')) return cor.trim();
      return EMBLEM_COLORS[cor] || EMBLEM_COLORS.dourado;
    }

    function shapeSvg(forma, fill) {
      if (forma === 'circulo') return `<circle cx="50" cy="50" r="37" fill="${fill}" />`;
      if (forma === 'hexagono') return `<path d="M50 8 L82 27 L82 73 L50 92 L18 73 L18 27 Z" fill="${fill}" />`;
      if (forma === 'losango') return `<path d="M50 6 L91 50 L50 94 L9 50 Z" fill="${fill}" />`;
      return `<path d="M50 8 C64 16 77 18 86 19 L83 55 C80 74 67 86 50 94 C33 86 20 74 17 55 L14 19 C23 18 36 16 50 8 Z" fill="${fill}" />`;
    }

    function iconSvg(icon) {
      const common = 'fill="none" stroke="#1d1522" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"';
      const thin = 'fill="none" stroke="#1d1522" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"';
      const icons = {
        espada: `<path ${common} d="M50 17 L56 52 L50 63 L44 52 Z"/><path ${common} d="M34 64 H66"/><path ${common} d="M50 64 V84"/><path ${common} d="M42 84 H58"/>`,
        cajado: `<path ${common} d="M55 18 C69 25 67 42 53 45 C40 48 34 34 44 26"/><path ${common} d="M51 45 V86"/><path ${thin} d="M39 61 C48 56 56 56 64 61"/>`,
        arco: `<path ${common} d="M65 13 C39 30 39 70 65 87"/><path ${thin} d="M65 13 V87"/><path ${thin} d="M30 50 H67"/><path ${thin} d="M54 41 L68 50 L54 59"/>`,
        adaga: `<path ${common} d="M51 16 L60 51 L50 63 L40 51 Z"/><path ${common} d="M36 64 H64"/><path ${common} d="M50 64 V84"/>`,
        alaude: `<ellipse ${common} cx="50" cy="61" rx="18" ry="21"/><path ${common} d="M50 40 V16 L66 20"/><path ${thin} d="M43 58 H57 M43 66 H57"/>`,
        escudo: `<path ${common} d="M50 16 C61 22 70 23 76 24 L73 53 C70 69 61 80 50 86 C39 80 30 69 27 53 L24 24 C30 23 39 22 50 16 Z"/><path ${thin} d="M50 30 V72 M35 48 H65"/>`,
        punho: `<path ${common} d="M31 48 V35 C31 30 39 30 39 35 V47"/><path ${common} d="M39 47 V30 C39 25 47 25 47 30 V47"/><path ${common} d="M47 47 V31 C47 26 55 26 55 31 V48"/><path ${common} d="M55 49 V38 C55 33 63 34 63 39 V57 C63 74 52 82 42 77 C35 74 29 67 29 57 V48 Z"/>`,
        estrela: `<path ${common} d="M50 14 L59 39 L86 39 L64 55 L72 82 L50 66 L28 82 L36 55 L14 39 L41 39 Z"/>`,
        raio: `<path ${common} d="M58 12 L28 55 H48 L42 88 L72 43 H52 Z"/>`,
        cafe: `<path ${common} d="M28 40 H61 V61 C61 72 52 80 43 80 C34 80 28 72 28 61 Z"/><path ${thin} d="M61 47 H69 C76 47 76 61 68 62 H61"/><path ${thin} d="M34 25 C31 20 38 18 35 13 M47 25 C44 20 51 18 48 13"/>`
      };
      return icons[icon] || icons.estrela;
    }

    function textureSvg(linhagem) {
      const l = String(linhagem || '').toLowerCase();
      const stroke = '#120d17';
      if (l.includes('tráfego') || l.includes('trafego')) {
        return `<g opacity=".10" stroke="${stroke}" stroke-width="3" stroke-linecap="round"><path d="M16 74 L38 52 L47 61"/><path d="M34 80 L61 53 L72 64"/><path d="M14 42 L31 25 L40 34"/></g>`;
      }
      if (l.includes('copy')) {
        return `<g opacity=".12" fill="${stroke}" font-family="Georgia" font-size="18" font-weight="900"><text x="18" y="33">“”</text><text x="58" y="47">“”</text><text x="30" y="76">“”</text></g>`;
      }
      if (l.includes('design')) {
        return `<g opacity=".10" stroke="${stroke}" stroke-width="2"><path d="M20 20 H80 M20 40 H80 M20 60 H80 M20 80 H80 M20 20 V80 M40 20 V80 M60 20 V80 M80 20 V80"/></g>`;
      }
      if (l.includes('cs') || l.includes('atendimento')) {
        return `<g opacity=".10" stroke="${stroke}" stroke-width="3" fill="none"><path d="M19 30 H48 V51 H34 L26 59 V51 H19 Z"/><path d="M52 49 H82 V70 H70 L62 78 V70 H52 Z"/></g>`;
      }
      if (l.includes('comercial')) {
        return `<g opacity=".11" stroke="${stroke}" stroke-width="4" fill="none" stroke-linecap="round"><circle cx="34" cy="35" r="9"/><path d="M34 26 V21 M34 44 V49 M28 35 H40"/><path d="M35 67 C43 58 50 58 58 67 M42 74 H66"/></g>`;
      }
      if (l.includes('rh')) {
        return `<g opacity=".11" fill="${stroke}"><path d="M31 31 C26 24 15 29 20 39 C23 44 31 50 31 50 C31 50 39 44 42 39 C47 29 36 24 31 31 Z"/><path d="M67 55 C62 48 51 53 56 63 C59 68 67 74 67 74 C67 74 75 68 78 63 C83 53 72 48 67 55 Z"/></g>`;
      }
      if (l.includes('audiovisual')) {
        return `<g opacity=".11" stroke="${stroke}" stroke-width="3" fill="none" stroke-linecap="round"><path d="M15 50 C24 32 34 68 43 50 C52 32 62 68 71 50 C76 40 81 43 85 50"/><path d="M18 70 C30 58 39 82 51 70 C62 58 70 77 82 66"/></g>`;
      }
      if (l.includes('sites')) {
        return `<g opacity=".12" fill="${stroke}" font-family="Georgia" font-size="28" font-weight="900"><text x="18" y="42">{</text><text x="67" y="70">}</text><text x="39" y="62">/</text></g>`;
      }
      return `<g opacity=".08" stroke="${stroke}" stroke-width="2"><path d="M20 28 H80 M20 50 H80 M20 72 H80"/></g>`;
    }

    function renderEmblem(appearance, lineage = '', size = 88) {
      const app = normalizeAppearance(appearance);
      const fill = getEmblemColor(app.cor);
      const frame = app.nivel_visual <= 3 ? '#b9bcc4' : '#f4c96b';
      return `
        <svg width="${size}" height="${size}" viewBox="0 0 100 100" role="img" aria-label="Emblema do personagem" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="emblemShadow${size}" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity=".35"/>
            </filter>
          </defs>
          <g filter="url(#emblemShadow${size})">
            ${shapeSvg(app.forma, fill)}
            ${textureSvg(lineage)}
            <g opacity=".16">${shapeSvg(app.forma, '#ffffff')}</g>
            <g>${iconSvg(app.icone)}</g>
            <circle cx="50" cy="50" r="45" fill="none" stroke="${frame}" stroke-width="4" opacity=".95"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#fff6df" stroke-width="1.5" opacity=".35"/>
          </g>
        </svg>
      `;
    }

    async function cleanupRealtime() {
      const existing = [...state.channels];
      state.channels = [];
      await Promise.all(existing.map(channel => supabaseClient.removeChannel(channel).catch(() => null)));
    }

    async function init() {
      state.screen = 'loading';
      setMessage(null, '');
      render();

      try {
        const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
        if (sessionError) throw sessionError;
        state.user = session?.user || null;

        if (!state.user) {
          state.screen = 'auth-required';
          setMessage('error', 'Você precisa entrar na sua conta Adaptia pelo Hub antes de jogar.');
          render();
          return;
        }

        await fetchCharactersForUser();
        const savedId = localStorage.getItem('adaptia_personagem_id');
        const savedCharacter = state.characters.find(character => character.id === savedId);

        if (savedCharacter) {
          state.personagem = savedCharacter;
          localStorage.setItem('adaptia_codigo_ficha', savedCharacter.codigo_ficha || '');
          state.screen = 'session-code';
        } else {
          state.screen = 'sheet-code';
        }
      } catch (error) {
        state.screen = 'auth-required';
        setMessage('error', `Erro ao verificar login: ${error.message || 'falha de conexão'}.`);
      }
      render();
    }

    async function fetchCharacterByCode(code) {
      const normalized = String(code || '').trim().toUpperCase();
      const { data, error } = await supabaseClient
        .from('personagens')
        .select('*')
        .eq('codigo_ficha', normalized)
        .maybeSingle();
      if (error) throw error;
      return data;
    }

    async function fetchCharactersForUser() {
      if (!state.user?.id) {
        state.characters = [];
        return [];
      }
      const { data, error } = await supabaseClient
        .from('personagens')
        .select('*')
        .eq('owner_id', state.user.id)
        .order('nivel', { ascending: false })
        .order('xp_atual', { ascending: false });
      if (error) throw error;
      state.characters = data || [];
      return state.characters;
    }

    function chooseCharacter(characterId) {
      const character = state.characters.find(item => item.id === characterId);
      if (!character) {
        setMessage('error', 'Personagem não encontrado nesta conta.');
        render();
        return;
      }
      state.personagem = character;
      localStorage.setItem('adaptia_personagem_id', character.id);
      localStorage.setItem('adaptia_codigo_ficha', character.codigo_ficha || '');
      state.screen = 'session-code';
      setMessage('ok', `Personagem selecionado: ${character.nome}.`);
      render();
    }

    async function refreshCharacter() {
      if (!state.personagem?.id) return;
      const { data, error } = await supabaseClient
        .from('personagens')
        .select('*')
        .eq('id', state.personagem.id)
        .maybeSingle();
      if (error) throw error;
      if (data) state.personagem = data;
    }

    async function loadCapitulo(capituloId) {
      if (state.capitulo?.id === capituloId) return state.capitulo;
      const { data, error } = await supabaseClient
        .from('capitulos')
        .select('*')
        .eq('id', capituloId)
        .maybeSingle();
      if (error) throw error;
      if (!data) throw new Error('Capítulo da sessão não encontrado.');
      state.capitulo = data;
      return data;
    }

    async function confirmSheetCode() {
      if (state.busy) return;
      if (!state.user?.id) {
        state.screen = 'auth-required';
        setMessage('error', 'Entre pelo Hub antes de importar uma ficha.');
        render();
        return;
      }

      const input = document.getElementById('sheetCodeInput');
      const code = String(input?.value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (code.length !== 8) {
        setMessage('error', 'Digite o código da ficha com 8 caracteres.');
        render();
        return;
      }

      state.busy = true;
      setMessage('info', 'Buscando ficha antiga em Adaptia...');
      render();

      try {
        const character = await fetchCharacterByCode(code);
        if (!character) {
          state.busy = false;
          setMessage('error', 'Ficha não encontrada, confira o código.');
          render();
          return;
        }
        if (character.owner_id && character.owner_id !== state.user.id) {
          state.busy = false;
          setMessage('error', 'Essa ficha já está vinculada a outro usuário.');
          render();
          return;
        }
        if (!character.owner_id) {
          const { error: updateError } = await supabaseClient
            .from('personagens')
            .update({ owner_id: state.user.id })
            .eq('id', character.id);
          if (updateError) throw updateError;
        }
        await fetchCharactersForUser();
        chooseCharacter(character.id);
      } catch (error) {
        setMessage('error', `Erro ao importar ficha: ${error.message || 'falha de conexão'}.`);
      }

      state.busy = false;
      render();
    }

    async function enterSession() {
      if (state.busy) return;
      const input = document.getElementById('sessionCodeInput');
      const code = String(input?.value || '').trim().toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
      if (code.length !== 4) {
        setMessage('error', 'Digite o código da sessão com 4 letras.');
        render();
        return;
      }
      if (!state.personagem?.id) {
        state.screen = 'sheet-code';
        setMessage('error', 'Antes de entrar na sessão, carregue sua ficha.');
        render();
        return;
      }

      state.busy = true;
      setMessage('info', 'Entrando na sessão...');
      render();

      try {
        const { data: sessao, error: sessionError } = await supabaseClient
          .from('sessoes')
          .select('*')
          .eq('codigo', code)
          .maybeSingle();

        if (sessionError) throw sessionError;
        if (!sessao) {
          state.busy = false;
          setMessage('error', 'Sessão não encontrada. Confira o código na TV.');
          render();
          return;
        }

        const { error: upsertError } = await supabaseClient
          .from('participantes_sessao')
          .upsert({
            sessao_id: sessao.id,
            personagem_id: state.personagem.id,
            conectado: true
          }, { onConflict: 'sessao_id,personagem_id' });

        if (upsertError) throw upsertError;

        state.sessao = sessao;
        localStorage.setItem('adaptia_sessao_id', sessao.id);
        localStorage.setItem('adaptia_sessao_codigo', sessao.codigo);
        await loadCapitulo(sessao.capitulo_id);
        await subscribeToSession(sessao.id);
        await routeBySessionStatus(sessao);
        setMessage(null, '');
      } catch (error) {
        setMessage('error', `Erro ao entrar na sessão: ${error.message || 'falha de conexão'}.`);
      }

      state.busy = false;
      render();
    }

    async function subscribeToSession(sessionId) {
      await cleanupRealtime();
      const channel = supabaseClient
        .channel(`adaptia-controle-sessao-${sessionId}-${Date.now()}`)
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'sessoes',
          filter: `id=eq.${sessionId}`
        }, async payload => {
          if (payload.new) {
            await handleSessionRealtime(payload.new);
          }
        })
        .subscribe(status => {
          if (status === 'CHANNEL_ERROR') {
            setMessage('error', 'Realtime da sessão falhou. Confira a conexão e recarregue se necessário.');
            render();
          }
        });
      state.channels.push(channel);
    }

    async function handleSessionRealtime(newSession) {
      const previousIndex = state.sessao?.evento_atual_index;
      const previousRound = state.sessao?.chefao_estado?.rodada_atual;
      state.sessao = newSession;

      try {
        if (newSession.status === 'finalizada') {
          await loadFinalSummary();
          state.screen = 'final';
          render();
          return;
        }

        if (newSession.status === 'em_andamento') {
          await loadCapitulo(newSession.capitulo_id);
          const newIndex = newSession.evento_atual_index;
          const newRound = newSession.chefao_estado?.rodada_atual;
          if (previousIndex !== newIndex || previousRound !== newRound || state.screen !== 'event') {
            state.currentAction = null;
            await loadCurrentAction();
          }
          state.screen = 'event';
          render();
          return;
        }

        state.screen = 'waiting';
        render();
      } catch (error) {
        setMessage('error', `Erro ao atualizar a sessão: ${error.message || 'falha de conexão'}.`);
        render();
      }
    }

    async function routeBySessionStatus(sessao) {
      if (sessao.status === 'finalizada') {
        await loadFinalSummary();
        state.screen = 'final';
        return;
      }
      if (sessao.status === 'em_andamento') {
        await loadCurrentAction();
        state.screen = 'event';
        return;
      }
      state.screen = 'waiting';
    }

    function getCurrentEvent() {
      const events = Array.isArray(state.capitulo?.eventos) ? state.capitulo.eventos : [];
      return events[state.sessao?.evento_atual_index || 0] || null;
    }

    function getBossState(evento) {
      const boss = state.sessao?.chefao_estado || {};
      const pvMax = Number(boss.pv_max ?? evento?.pv_max ?? 1);
      return {
        pv_atual: Number(boss.pv_atual ?? pvMax),
        pv_max: pvMax,
        dd: Number(boss.dd ?? evento?.dd ?? 10),
        rodada_atual: Number(boss.rodada_atual ?? 1),
        rodada_inicio_em: boss.rodada_inicio_em || null
      };
    }

    async function loadCurrentAction() {
      if (!state.sessao?.id || !state.personagem?.id) return null;
      const evento = getCurrentEvent();
      if (!evento) return null;

      let query = supabaseClient
        .from('acoes_jogador')
        .select('*')
        .eq('sessao_id', state.sessao.id)
        .eq('personagem_id', state.personagem.id)
        .eq('evento_index', state.sessao.evento_atual_index)
        .order('criado_em', { ascending: false })
        .limit(1);

      if (evento.tipo === 'chefao') {
        const bossState = getBossState(evento);
        if (bossState.rodada_inicio_em) {
          query = query.gte('criado_em', bossState.rodada_inicio_em);
        }
      }

      const { data, error } = await query.maybeSingle();
      if (error) throw error;
      state.currentAction = data || null;
      return state.currentAction;
    }

    async function animateD20() {
      state.rolling = true;
      state.rollPreview = 'd20';
      render();
      await wait(80);
      const die = document.getElementById('rollingDie');
      for (let i = 0; i < 14; i++) {
        if (die) die.textContent = String(randomInt(1, 20));
        await wait(45 + i * 4);
      }
      const finalRoll = randomInt(1, 20);
      if (die) die.textContent = String(finalRoll);
      await wait(360);
      state.rolling = false;
      return finalRoll;
    }

    async function decideCommon(decision) {
      if (state.busy || !state.sessao || !state.personagem) return;
      const evento = getCurrentEvent();
      if (!evento || evento.tipo !== 'evento') return;

      state.busy = true;
      setMessage(null, '');
      render();

      try {
        let payload = {
          sessao_id: state.sessao.id,
          personagem_id: state.personagem.id,
          evento_index: state.sessao.evento_atual_index,
          decisao: decision,
          resultado_dado: null,
          resultado_total: null,
          sucesso: null
        };

        if (decision === 'enfrentar') {
          const roll = await animateD20();
          const attr = evento.atributo;
          const mod = modifier(state.personagem.atributos?.[attr]);
          const total = roll + mod;
          payload = {
            ...payload,
            resultado_dado: roll,
            resultado_total: total,
            sucesso: total >= Number(evento.dd || 0)
          };
        }

        const { data, error } = await supabaseClient
          .from('acoes_jogador')
          .insert(payload)
          .select('*')
          .single();
        if (error) throw error;
        state.currentAction = data;
        setMessage('ok', decision === 'ignorar' ? 'Você ignorou este evento. Café preservado.' : 'Jogada registrada. Agora é aguardar o Mestre.');
      } catch (error) {
        setMessage('error', `Erro ao registrar ação: ${error.message || 'falha de conexão'}.`);
      }

      state.busy = false;
      render();
    }

    async function decideBoss(decision) {
      if (state.busy || !state.sessao || !state.personagem) return;
      const evento = getCurrentEvent();
      if (!evento || evento.tipo !== 'chefao') return;
      const bossState = getBossState(evento);

      state.busy = true;
      setMessage(null, '');
      render();

      try {
        let payload = {
          sessao_id: state.sessao.id,
          personagem_id: state.personagem.id,
          evento_index: state.sessao.evento_atual_index,
          decisao: decision,
          resultado_dado: null,
          resultado_total: null,
          sucesso: null
        };

        if (decision === 'atacar') {
          const roll = await animateD20();
          const mainAttr = CLASS_MAIN_ATTRIBUTE[state.personagem.classe] || 'Resiliência';
          const mod = modifier(state.personagem.atributos?.[mainAttr]);
          const total = roll + mod;
          payload = {
            ...payload,
            resultado_dado: roll,
            resultado_total: total,
            sucesso: total >= bossState.dd
          };
        }

        const { data, error } = await supabaseClient
          .from('acoes_jogador')
          .insert(payload)
          .select('*')
          .single();
        if (error) throw error;
        state.currentAction = data;
        setMessage('ok', 'Ação da rodada registrada. Agora é com o Mestre e o caos organizado.');
      } catch (error) {
        setMessage('error', `Erro ao registrar ação: ${error.message || 'falha de conexão'}.`);
      }

      state.busy = false;
      render();
    }

    async function loadFinalSummary() {
      try {
        await refreshCharacter();
        const { data, error } = await supabaseClient
          .from('acoes_jogador')
          .select('xp_ganho')
          .eq('sessao_id', state.sessao.id)
          .eq('personagem_id', state.personagem.id);
        if (error) throw error;
        const xpGanho = (data || []).reduce((sum, action) => sum + Number(action.xp_ganho || 0), 0);
        state.summary = { xpGanho };
      } catch (error) {
        state.summary = { xpGanho: 0 };
        setMessage('error', `Erro ao carregar resumo: ${error.message || 'falha de conexão'}.`);
      }
    }

    async function leaveSession() {
      if (state.busy) return;
      state.busy = true;
      setMessage(null, '');
      render();

      try {
        if (state.sessao?.id && state.personagem?.id) {
          await supabaseClient
            .from('participantes_sessao')
            .update({ conectado: false })
            .eq('sessao_id', state.sessao.id)
            .eq('personagem_id', state.personagem.id);
        }
      } catch (error) {
        setMessage('error', `Não consegui marcar saída no banco, mas vou limpar esta sessão no aparelho: ${error.message || 'falha de conexão'}.`);
      }

      await cleanupRealtime();
      localStorage.removeItem('adaptia_sessao_id');
      localStorage.removeItem('adaptia_sessao_codigo');
      state.sessao = null;
      state.capitulo = null;
      state.currentAction = null;
      state.summary = null;
      state.screen = 'session-code';
      state.busy = false;
      render();
    }

    function resetSheet() {
      localStorage.removeItem('adaptia_personagem_id');
      localStorage.removeItem('adaptia_codigo_ficha');
      localStorage.removeItem('adaptia_sessao_id');
      localStorage.removeItem('adaptia_sessao_codigo');
      state.personagem = null;
      state.sessao = null;
      state.capitulo = null;
      state.currentAction = null;
      state.summary = null;
      state.screen = 'sheet-code';
      setMessage(null, '');
      cleanupRealtime();
      render();
    }

    function renderWaitingScreen() {
      return `
        <section class="panel center">
          ${characterMiniCard(true)}
          <div class="waiting-orb" aria-hidden="true"></div>
          <h2>Você entrou como ${escapeHTML(state.personagem?.nome || '')}</h2>
          <p class="muted">Aguardando o Mestre iniciar a sessão...</p>
          <div class="hero-note" style="margin-top:14px;" role="note">
            <strong>Código da sessão: ${escapeHTML(state.sessao?.codigo || '')}</strong>
            <span>Quando o Mestre iniciar, esta tela muda sozinha. Sem F5, sem ritual de invocação.</span>
          </div>
          <div style="margin-top:14px;">
            <button class="btn btn-secondary" type="button" data-action="leave-session" ${state.busy ? 'disabled' : ''}>Sair da sessão</button>
          </div>
          ${renderMessage()}
        </section>
      `;
    }

    function renderEventScreen() {
      const evento = getCurrentEvent();
      if (!evento) {
        return `
          <section class="panel">
            ${characterMiniCard(false)}
            <h2>Evento não encontrado</h2>
            <p class="muted">A sessão aponta para um evento que não existe no capítulo atual.</p>
            ${renderMessage()}
          </section>
        `;
      }

      if (state.busy && state.rolling) {
        return renderRollingScreen(evento);
      }

      if (state.currentAction) {
        return renderAlreadyDecided(evento, state.currentAction);
      }

      return evento.tipo === 'chefao' ? renderBossEvent(evento) : renderCommonEvent(evento);
    }

    function renderEventShell(evento, content) {
      return `
        <section class="panel event-card">
          ${characterMiniCard(false)}
          <div class="event-title">
            <div class="tag-row">
              <span class="pill gold">Evento ${Number(state.sessao?.evento_atual_index || 0) + 1}</span>
              <span class="pill ${evento.tipo === 'chefao' ? 'blue' : ''}">${evento.tipo === 'chefao' ? 'Chefão' : 'Evento comum'}</span>
              ${evento.tipo === 'chefao' ? `<span class="pill">Rodada ${getBossState(evento).rodada_atual}</span>` : ''}
            </div>
            <h2>${escapeHTML(evento.titulo)}</h2>
          </div>
          <div class="narrative">${escapeHTML(evento.narrativa)}</div>
          ${content}
          ${renderMessage()}
        </section>
      `;
    }

    function renderCommonEvent(evento) {
      const attr = evento.atributo;
      const attrValue = Number(state.personagem?.atributos?.[attr] || 0);
      const mod = modifier(attrValue);
      return renderEventShell(evento, `
        <div class="stat-grid">
          <div class="stat-card"><small>Atributo</small><strong>${escapeHTML(attr)}</strong></div>
          <div class="stat-card"><small>DD</small><strong>${escapeHTML(evento.dd)}</strong></div>
          <div class="stat-card"><small>Seu valor</small><strong>${attrValue}</strong></div>
          <div class="stat-card"><small>Modificador</small><strong>+${mod}</strong></div>
        </div>
        <div class="action-area">
          <button class="btn btn-primary" type="button" data-action="common-face" ${state.busy ? 'disabled' : ''}>⚔️ Enfrentar</button>
          <button class="btn btn-secondary" type="button" data-action="common-ignore" ${state.busy ? 'disabled' : ''}>☕ Ignorar</button>
        </div>
      `);
    }

    function renderBossEvent(evento) {
      const boss = getBossState(evento);
      const percentage = clamp((boss.pv_atual / Math.max(1, boss.pv_max)) * 100, 0, 100);
      const mainAttr = CLASS_MAIN_ATTRIBUTE[state.personagem?.classe] || 'Resiliência';
      const attrValue = Number(state.personagem?.atributos?.[mainAttr] || 0);
      const mod = modifier(attrValue);
      return renderEventShell(evento, `
        <div class="hp-box" aria-label="PV do chefão">
          <div class="hp-top"><span>PV do Chefão</span><span>${boss.pv_atual}/${boss.pv_max}</span></div>
          <div class="hp-track"><div class="hp-fill" style="width:${percentage}%"></div></div>
        </div>
        <div class="stat-grid">
          <div class="stat-card"><small>DD do Chefão</small><strong>${boss.dd}</strong></div>
          <div class="stat-card"><small>Seu atributo</small><strong>${escapeHTML(mainAttr)}</strong></div>
          <div class="stat-card"><small>Seu valor</small><strong>${attrValue}</strong></div>
          <div class="stat-card"><small>Modificador</small><strong>+${mod}</strong></div>
        </div>
        <div class="action-area">
          <button class="btn btn-primary" type="button" data-action="boss-attack" ${state.busy ? 'disabled' : ''}>⚔️ Atacar</button>
          <button class="btn btn-green" type="button" data-action="boss-support" ${state.busy ? 'disabled' : ''}>🤝 Apoiar</button>
          <button class="btn btn-secondary" type="button" data-action="boss-retreat" ${state.busy ? 'disabled' : ''}>🛡️ Recuar</button>
        </div>
        <p class="tiny">Apoiar e recuar são registrados sem rolagem nesta versão. O Mestre resolve os efeitos na Tela do Mestre.</p>
      `);
    }

    function renderRollingScreen(evento) {
      return renderEventShell(evento, `
        <div class="dice-stage" aria-live="polite">
          <div class="die rolling" id="rollingDie">${escapeHTML(state.rollPreview)}</div>
        </div>
        <p class="center muted">Rolando o d20... que o algoritmo tenha piedade.</p>
      `);
    }

    function renderAlreadyDecided(evento, action) {
      let outcome = '';
      if (action.decisao === 'ignorar') {
        outcome = `
          <div class="result-box">
            <div class="result-main">☕ Você ignorou este evento</div>
            <div class="result-detail">Sem rolagem registrada. Aguarde o Mestre avançar a cena.</div>
          </div>
        `;
      } else if (action.decisao === 'apoiar') {
        outcome = `
          <div class="result-box successful">
            <div class="result-main">🤝 Você escolheu apoiar</div>
            <div class="result-detail">Ação registrada para a rodada atual. Aguarde a resolução do Mestre.</div>
          </div>
        `;
      } else if (action.decisao === 'recuar') {
        outcome = `
          <div class="result-box">
            <div class="result-main">🛡️ Você recuou</div>
            <div class="result-detail">Ação registrada. Você saiu do risco direto desta rodada.</div>
          </div>
        `;
      } else {
        const successClass = action.sucesso ? 'successful' : 'failed';
        const successText = action.sucesso ? '✅ Sucesso' : '❌ Falha';
        outcome = `
          <div class="result-box ${successClass}">
            <div class="result-main">${successText}</div>
            <div class="result-detail">Dado: ${action.resultado_dado ?? '-'} • Total: ${action.resultado_total ?? '-'} • Decisão: ${escapeHTML(action.decisao)}</div>
          </div>
        `;
      }

      return renderEventShell(evento, `
        ${outcome}
        <div class="hero-note" role="note">
          <strong>Você já decidiu.</strong>
          <span>Aguardando o restante do grupo e o Mestre resolver a cena. Se for chefão, uma nova rodada libera outra ação quando o Mestre avançar.</span>
        </div>
      `);
    }

    function renderFinalScreen() {
      const p = state.personagem;
      const summary = state.summary || { xpGanho: 0 };
      return `
        <section class="panel center">
          ${characterMiniCard(true)}
          <h2>Resumo pessoal</h2>
          <p class="muted">Sessão finalizada. Pode guardar o celular e voltar para o plano material.</p>
          <div class="summary-list" style="margin-top:16px; text-align:left;">
            <div class="summary-item"><span>Nível final</span><strong>${escapeHTML(p?.nivel ?? '-')}</strong></div>
            <div class="summary-item"><span>XP ganho na sessão</span><strong>${escapeHTML(summary.xpGanho ?? 0)}</strong></div>
            <div class="summary-item"><span>XP atual total</span><strong>${escapeHTML(p?.xp_atual ?? '-')}</strong></div>
            <div class="summary-item"><span>PV final</span><strong>${escapeHTML(p?.pv_atual ?? '-')}/${escapeHTML(p?.pv_max ?? '-')}</strong></div>
          </div>
          <p class="tiny" style="margin-top:12px;">O XP ganho vem da soma de <code>xp_ganho</code> nas suas ações desta sessão.</p>
          <div style="margin-top:16px;">
            <button class="btn btn-primary" type="button" data-action="leave-session" ${state.busy ? 'disabled' : ''}>Sair da sessão</button>
          </div>
          ${renderMessage()}
        </section>
      `;
    }

    function render() {
      const views = {
        'loading': renderLoading,
        'auth-required': renderAuthRequiredScreen,
        'sheet-code': renderSheetCodeScreen,
        'session-code': renderSessionCodeScreen,
        'waiting': renderWaitingScreen,
        'event': renderEventScreen,
        'final': renderFinalScreen
      };
      const view = views[state.screen] || renderLoading;
      app.innerHTML = view();
    }

    app.addEventListener('click', event => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      if (action === 'confirm-sheet') confirmSheetCode();
      if (action === 'choose-character') chooseCharacter(button.dataset.characterId);
      if (action === 'enter-session') enterSession();
      if (action === 'reset-sheet') resetSheet();
      if (action === 'leave-session') leaveSession();
      if (action === 'common-face') decideCommon('enfrentar');
      if (action === 'common-ignore') decideCommon('ignorar');
      if (action === 'boss-attack') decideBoss('atacar');
      if (action === 'boss-support') decideBoss('apoiar');
      if (action === 'boss-retreat') decideBoss('recuar');
    });

    app.addEventListener('input', event => {
      if (event.target.id === 'sheetCodeInput') {
        event.target.value = event.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      }
      if (event.target.id === 'sessionCodeInput') {
        event.target.value = event.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
      }
    });

    app.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      if (event.target.id === 'sheetCodeInput') confirmSheetCode();
      if (event.target.id === 'sessionCodeInput') enterSession();
    });

    window.addEventListener('beforeunload', () => {
      state.channels.forEach(channel => {
        try { supabaseClient.removeChannel(channel); } catch (_) {}
      });
    });

    init();
  </script>
</body>
</html>
